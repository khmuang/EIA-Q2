<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>EIA Dashboard - Premium V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060b18; --header-text: #ffffff; --sub-text: #94a3b8; --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08); --item-bg: rgba(0, 0, 0, 0.2); --item-border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff; --text-muted: #64748b; --nav-bg: rgba(6, 11, 24, 0.85);
            --accent-emerald: #10b981; --accent-rose: #f43f5e; --accent-amber: #f59e0b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        header { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border); padding: 1rem 2rem; }
        .glass { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--card-border); border-radius: 24px; }
        .btn-filter { padding: 8px 20px; border-radius: 14px; font-size: 10px; font-weight: 900; text-transform: uppercase; transition: 0.3s; color: var(--text-muted); }
        .btn-filter.active { background: var(--accent-emerald); color: white; box-shadow: 0 0 20px rgba(16,185,129,0.2); }
        .metric-label { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
        .metric-value { font-size: 2.5rem; font-weight: 900; line-height: 1; }
        .bar-chart-container { height: 8px; background: var(--item-border); border-radius: 10px; overflow: hidden; }
        .bar-chart-fill { height: 100%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .team-row { display: grid; grid-template-columns: 1fr 60px 60px 50px; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--item-border); align-items: center; transition: 0.2s; }
    </style>
</head>
<body class="pb-12">
    <header class="flex justify-between items-center">
        <div><h1 class="text-2xl font-black italic tracking-tighter">EIA DASHBOARD <span class="text-emerald-500">V23</span></h1></div>
        <div class="glass p-1 flex gap-1" style="border-radius: 16px;">
            <button onclick="setFilter('All')" id="btn-All" class="btn-filter active">Global</button>
            <button onclick="setFilter('Branch')" id="btn-Branch" class="btn-filter">Branch</button>
            <button onclick="setFilter('HO')" id="btn-HO" class="btn-filter">HO</button>
            <button onclick="setFilter('DC')" id="btn-DC" class="btn-filter">DC</button>
        </div>
    </header>
    <main class="max-w-[1600px] mx-auto mt-8 px-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass p-8"><p class="metric-label">Grand Total Assets</p><div id="stat-total" class="metric-value mt-2">25,169</div></div>
            <div class="glass p-8 border-l-4 border-emerald-500"><p class="metric-label text-emerald-500">Success</p><div id="stat-y" class="metric-value mt-2 text-emerald-500">0</div></div>
            <div class="glass p-8 border-l-4 border-rose-500"><p class="metric-label text-rose-500">Pending</p><div id="stat-n" class="metric-value mt-2 text-rose-400">0</div></div>
            <div class="glass p-8 border-l-4 border-blue-500"><p class="metric-label text-blue-500">Health</p><div id="stat-pct" class="metric-value mt-2 text-blue-400">0%</div></div>
        </div>
        <div id="cards-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-8"></div>
    </main>
    <script>
        const rawData = [{"topic": "1", "name": "IT Asset incomplete information", "stats": {"Branch": {"Y": 194, "N": 52, "Teams": {"Branch": {"Y": 194, "N": 52}}}, "HO": {"Y": 60, "N": 0, "Teams": {"HO": {"Y": 60, "N": 0}}}, "DC": {"Y": 33, "N": 5, "Teams": {"DC": {"Y": 33, "N": 5}}}, "All": {"Y": 287, "N": 57, "Teams": {"Branch": {"Y": 194, "N": 52}, "HO": {"Y": 60, "N": 0}, "DC": {"Y": 33, "N": 5}}}}}, {"topic": "2", "name": "Update OS - Replace", "stats": {"Branch": {"Y": 20, "N": 7545, "Teams": {"Branch": {"Y": 20, "N": 7545}}}, "HO": {"Y": 55, "N": 2636, "Teams": {"HO": {"Y": 55, "N": 2636}}}, "DC": {"Y": 69, "N": 794, "Teams": {"DC": {"Y": 69, "N": 794}}}, "All": {"Y": 144, "N": 10975, "Teams": {"Branch": {"Y": 20, "N": 7545}, "HO": {"Y": 55, "N": 2636}, "DC": {"Y": 69, "N": 794}}}}}, {"topic": "3", "name": "Require Restart", "stats": {"Branch": {"Y": 757, "N": 31, "Teams": {"Branch": {"Y": 757, "N": 31}}}, "HO": {"Y": 1239, "N": 128, "Teams": {"HO": {"Y": 1239, "N": 128}}}, "DC": {"Y": 217, "N": 12, "Teams": {"DC": {"Y": 217, "N": 12}}}, "All": {"Y": 2213, "N": 171, "Teams": {"Branch": {"Y": 757, "N": 31}, "HO": {"Y": 1239, "N": 128}, "DC": {"Y": 217, "N": 12}}}}}, {"topic": "4", "name": "Antivirus not Install", "stats": {"Branch": {"Y": 78, "N": 251, "Teams": {"Branch": {"Y": 78, "N": 251}}}, "HO": {"Y": 265, "N": 3, "Teams": {"HO": {"Y": 265, "N": 3}}}, "DC": {"Y": 16, "N": 18, "Teams": {"DC": {"Y": 16, "N": 18}}}, "All": {"Y": 359, "N": 272, "Teams": {"HO": {"Y": 265, "N": 3}, "Branch": {"Y": 78, "N": 251}, "DC": {"Y": 16, "N": 18}}}}}, {"topic": "5", "name": "Built-in Firewall enable", "stats": {"Branch": {"Y": 3030, "N": 1570, "Teams": {"Branch": {"Y": 3030, "N": 1570}}}, "HO": {"Y": 1217, "N": 237, "Teams": {"HO": {"Y": 1217, "N": 237}}}, "DC": {"Y": 822, "N": 97, "Teams": {"DC": {"Y": 822, "N": 97}}}, "All": {"Y": 5069, "N": 1904, "Teams": {"HO": {"Y": 1217, "N": 237}, "Branch": {"Y": 3030, "N": 1570}, "DC": {"Y": 822, "N": 97}}}}}, {"topic": "6", "name": "Join Domain status", "stats": {"Branch": {"Y": 61, "N": 83, "Teams": {"Branch": {"Y": 61, "N": 83}}}, "HO": {"Y": 278, "N": 96, "Teams": {"HO": {"Y": 278, "N": 96}}}, "DC": {"Y": 16, "N": 2, "Teams": {"DC": {"Y": 16, "N": 2}}}, "All": {"Y": 355, "N": 181, "Teams": {"Branch": {"Y": 61, "N": 83}, "HO": {"Y": 278, "N": 96}, "DC": {"Y": 16, "N": 2}}}}}, {"topic": "7", "name": "Privileged User management", "stats": {"Branch": {"Y": 137, "N": 1722, "Teams": {"Branch": {"Y": 137, "N": 1722}}}, "HO": {"Y": 181, "N": 768, "Teams": {"HO": {"Y": 181, "N": 768}}}, "DC": {"Y": 118, "N": 247, "Teams": {"DC": {"Y": 118, "N": 247}}}, "All": {"Y": 436, "N": 2737, "Teams": {"Branch": {"Y": 137, "N": 1722}, "HO": {"Y": 181, "N": 768}, "DC": {"Y": 118, "N": 247}}}}}, {"topic": "8", "name": "Document request evidence", "stats": {"Branch": {"Y": 0, "N": 3, "Teams": {"Branch": {"Y": 0, "N": 3}}}, "HO": {"Y": 3, "N": 0, "Teams": {"HO": {"Y": 3, "N": 0}}}, "DC": {"Y": 0, "N": 3, "Teams": {"DC": {"Y": 0, "N": 3}}}, "All": {"Y": 3, "N": 6, "Teams": {"HO": {"Y": 3, "N": 0}, "DC": {"Y": 0, "N": 3}, "Branch": {"Y": 0, "N": 3}}}}}]; let currentFilter = 'All';
        function format(n) { return n.toLocaleString(); }
        function setFilter(f) {
            currentFilter = f; document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+f).classList.add('active'); render();
        }
        function render() {
            const grid = document.getElementById('cards-grid'); grid.innerHTML = ''; let gY = 0, gN = 0;
            rawData.forEach(topic => {
                const s = topic.stats[currentFilter]; const total = s.Y + s.N; const pct = total > 0 ? ((s.Y/total)*100).toFixed(1) : 0;
                gY += s.Y; gN += s.N; const colorClass = pct >= 90 ? 'emerald' : pct >= 70 ? 'blue' : pct >= 50 ? 'amber' : 'rose';
                const colorHex = pct >= 90 ? '#10b981' : pct >= 70 ? '#3b82f6' : pct >= 50 ? '#f59e0b' : '#f43f5e';
                let teamsHtml = ''; Object.keys(s.Teams).sort().forEach(tm => {
                    const ty = s.Teams[tm].Y, tn = s.Teams[tm].N; const tp = (ty+tn)>0?((ty/(ty+tn))*100).toFixed(0):0;
                    teamsHtml += `<div class="team-row"><span class="text-xs font-bold truncate">${tm}</span><span class="text-[10px] font-black text-emerald-500 text-right">Y: ${format(ty)}</span><span class="text-[10px] font-black text-rose-400 text-right">N: ${format(tn)}</span><span class="text-[9px] font-black bg-white/5 px-2 py-0.5 rounded text-center">${tp}%</span></div>`;
                });
                grid.innerHTML += `<div id="topic-${topic.topic}" class="glass p-8 flex flex-col"><div class="flex justify-between items-start mb-6"><div><span class="text-[9px] font-black px-2 py-0.5 rounded-full bg-${colorClass}-500/10 text-${colorClass}-500 uppercase">Topic ${topic.topic}</span><h3 class="text-xl font-black uppercase mt-2">${topic.name}</h3></div><div class="text-right"><div class="text-3xl font-black text-${colorClass}-500">${pct}%</div></div></div><div class="bar-chart-container mb-8"><div class="bar-chart-fill" style="width: ${pct}%; background: ${colorHex}"></div></div><div class="flex-1 bg-black/10 rounded-2xl overflow-hidden"><div class="max-h-[250px] overflow-y-auto">${teamsHtml}</div></div></div>`;
            });
            const gTotal = gY + gN; const gPct = gTotal > 0 ? ((gY/gTotal)*100).toFixed(1) : 0;
            document.getElementById('stat-total').innerText = currentFilter === 'All' ? '25,169' : format(gTotal);
            document.getElementById('stat-y').innerText = format(gY); document.getElementById('stat-n').innerText = format(gN);
            document.getElementById('stat-pct').innerText = gPct + '%';
        }
        render();
    </script>
</body></html>
