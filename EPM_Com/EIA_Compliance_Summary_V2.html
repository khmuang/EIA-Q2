<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>EIA Compliance Summary V2 - Business Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; min-height: 100vh; }
        .sticky-header { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid #e2e8f0; }
        .filter-btn { transition: all 0.2s; }
        .filter-btn.active { background: #059669; color: white; box-shadow: 0 4px 12px rgba(5,150,105,0.2); }
        .topic-card { border: 1px solid #e2e8f0; transition: all 0.3s; background: white; }
        .topic-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.05); border-color: #059669; }
        .team-list { background: #f8fafc; border-radius: 12px; margin-top: 15px; max-height: 180px; overflow-y: auto; border: 1px solid #f1f5f9; }
        .team-row { display: grid; grid-template-columns: 1fr auto auto; gap: 15px; padding: 6px 12px; border-bottom: 1px solid #f1f5f9; align-items: center; font-size: 10px; }
        .team-row:last-child { border-bottom: none; }
        .chart-container { background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 24px; margin-bottom: 32px; }
    </style>
</head>
<body class="p-0">
    <div class="sticky-header mb-6">
        <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center text-white text-xl shadow-md">📊</div>
                <div>
                    <h1 class="text-lg font-black text-slate-800 uppercase tracking-tight">EIA Compliance Summary <span id="current-filter-label" class="text-emerald-600">ALL</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">IT Asset & Security Management</p>
                </div>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200 gap-1">
                <button onclick="updateFilter('All')" id="btn-All" class="filter-btn px-6 py-2 rounded-lg text-xs font-black uppercase active">All</button>
                <button onclick="updateFilter('Branch')" id="btn-Branch" class="filter-btn px-6 py-2 rounded-lg text-xs font-black uppercase">Branch</button>
                <button onclick="updateFilter('HO')" id="btn-HO" class="filter-btn px-6 py-2 rounded-lg text-xs font-black uppercase">HO</button>
                <button onclick="updateFilter('DC')" id="btn-DC" class="filter-btn px-6 py-2 rounded-lg text-xs font-black uppercase">DC</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 pb-12">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white border p-5 rounded-2xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Success</p><h2 id="summary-y" class="text-3xl font-black text-emerald-600">0</h2></div>
            <div class="bg-white border p-5 rounded-2xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Pending</p><h2 id="summary-n" class="text-3xl font-black text-rose-500">0</h2></div>
            <div class="bg-white border p-5 rounded-2xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total</p><h2 id="summary-total" class="text-3xl font-black text-slate-700">0</h2></div>
            <div class="bg-slate-800 p-5 rounded-2xl shadow-lg border-b-4 border-emerald-500"><p class="text-[9px] font-black text-emerald-400 uppercase tracking-widest mb-1">Health Rate</p><h2 id="summary-pct" class="text-3xl font-black text-white">0%</h2></div>
        </div>

        <div class="chart-container">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Compliance Overview vs Target (95%)
            </h3>
            <div class="h-[450px]"><canvas id="overviewChart"></canvas></div>
        </div>

        <div id="topics-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <script>
        const rawData = [{"topic": "1", "name": "IT Asset incomplete information", "stats": {"Branch": {"Y": 194, "N": 52, "Teams": {"Branch": {"Y": 194, "N": 52}}}, "HO": {"Y": 60, "N": 0, "Teams": {"HO": {"Y": 60, "N": 0}}}, "DC": {"Y": 33, "N": 5, "Teams": {"DC": {"Y": 33, "N": 5}}}, "All": {"Y": 287, "N": 57, "Teams": {"Branch": {"Y": 194, "N": 52}, "HO": {"Y": 60, "N": 0}, "DC": {"Y": 33, "N": 5}}}}}, {"topic": "2.1", "name": "Update OS - Replace", "stats": {"Branch": {"Y": 20, "N": 7545, "Teams": {"Branch": {"Y": 20, "N": 7545}}}, "HO": {"Y": 55, "N": 2636, "Teams": {"HO": {"Y": 55, "N": 2636}}}, "DC": {"Y": 69, "N": 794, "Teams": {"DC": {"Y": 69, "N": 794}}}, "All": {"Y": 144, "N": 10975, "Teams": {"Branch": {"Y": 20, "N": 7545}, "HO": {"Y": 55, "N": 2636}, "DC": {"Y": 69, "N": 794}}}}}, {"topic": "2.2", "name": "Require Restart", "stats": {"Branch": {"Y": 757, "N": 31, "Teams": {"Branch": {"Y": 757, "N": 31}}}, "HO": {"Y": 1239, "N": 128, "Teams": {"HO": {"Y": 1239, "N": 128}}}, "DC": {"Y": 217, "N": 12, "Teams": {"DC": {"Y": 217, "N": 12}}}, "All": {"Y": 2213, "N": 171, "Teams": {"Branch": {"Y": 757, "N": 31}, "HO": {"Y": 1239, "N": 128}, "DC": {"Y": 217, "N": 12}}}}}, {"topic": "3", "name": "Antivirus not Install", "stats": {"Branch": {"Y": 78, "N": 251, "Teams": {"Branch": {"Y": 78, "N": 251}}}, "HO": {"Y": 265, "N": 3, "Teams": {"HO": {"Y": 265, "N": 3}}}, "DC": {"Y": 16, "N": 18, "Teams": {"DC": {"Y": 16, "N": 18}}}, "All": {"Y": 359, "N": 272, "Teams": {"HO": {"Y": 265, "N": 3}, "Branch": {"Y": 78, "N": 251}, "DC": {"Y": 16, "N": 18}}}}}, {"topic": "4", "name": "Built-in Firewall enable", "stats": {"Branch": {"Y": 3030, "N": 1570, "Teams": {"Branch": {"Y": 3030, "N": 1570}}}, "HO": {"Y": 1217, "N": 237, "Teams": {"HO": {"Y": 1217, "N": 237}}}, "DC": {"Y": 822, "N": 97, "Teams": {"DC": {"Y": 822, "N": 97}}}, "All": {"Y": 5069, "N": 1904, "Teams": {"HO": {"Y": 1217, "N": 237}, "Branch": {"Y": 3030, "N": 1570}, "DC": {"Y": 822, "N": 97}}}}}, {"topic": "5", "name": "Join Domain status", "stats": {"Branch": {"Y": 61, "N": 83, "Teams": {"Branch": {"Y": 61, "N": 83}}}, "HO": {"Y": 279, "N": 95, "Teams": {"HO": {"Y": 279, "N": 95}}}, "DC": {"Y": 16, "N": 2, "Teams": {"DC": {"Y": 16, "N": 2}}}, "All": {"Y": 356, "N": 180, "Teams": {"Branch": {"Y": 61, "N": 83}, "HO": {"Y": 279, "N": 95}, "DC": {"Y": 16, "N": 2}}}}}, {"topic": "6", "name": "Privileged User management", "stats": {"Branch": {"Y": 137, "N": 1722, "Teams": {"Branch": {"Y": 137, "N": 1722}}}, "HO": {"Y": 181, "N": 768, "Teams": {"HO": {"Y": 181, "N": 768}}}, "DC": {"Y": 118, "N": 247, "Teams": {"DC": {"Y": 118, "N": 247}}}, "All": {"Y": 436, "N": 2737, "Teams": {"Branch": {"Y": 137, "N": 1722}, "HO": {"Y": 181, "N": 768}, "DC": {"Y": 118, "N": 247}}}}}, {"topic": "7", "name": "Document request evidence", "stats": {"Branch": {"Y": 3, "N": 0, "Teams": {"Branch": {"Y": 3, "N": 0}}}, "HO": {"Y": 3, "N": 0, "Teams": {"HO": {"Y": 3, "N": 0}}}, "DC": {"Y": 3, "N": 0, "Teams": {"DC": {"Y": 3, "N": 0}}}, "All": {"Y": 9, "N": 0, "Teams": {"HO": {"Y": 3, "N": 0}, "DC": {"Y": 3, "N": 0}, "Branch": {"Y": 3, "N": 0}}}}}];
        let overviewChart = null;
        
        // Custom Plugin to draw Target Line at 95%
        const targetLinePlugin = {
            id: 'targetLine',
            afterDraw: (chart) => {
                if (chart.config.options.plugins.targetLine === false) return;
                const { ctx, chartArea: { top, bottom, left, right }, scales: { x } } = chart;
                const targetValue = 95;
                const xPos = x.getPixelForValue(targetValue);
                
                ctx.save();
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = '#f43f5e';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(xPos, top); ctx.lineTo(xPos, bottom); ctx.stroke();
                
                ctx.fillStyle = '#f43f5e'; ctx.font = 'bold 10px Sarabun';
                ctx.fillText('TARGET 95%', xPos - 25, top - 10);
                ctx.restore();
            }
        };
        Chart.register(targetLinePlugin);

        function updateFilter(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + filter).classList.add('active');
            document.getElementById('current-filter-label').innerText = filter.toUpperCase();
            let grandY = 0, grandN = 0;
            const container = document.getElementById('topics-container'); container.innerHTML = '';
            const chartLabels = [], chartData = [], chartColors = [], chartRaw = [];

            rawData.forEach(t => {
                const s = t.stats[filter]; const total = s.Y + s.N;
                const pct = total > 0 ? ((s.Y / total) * 100).toFixed(1) : 0;
                grandY += s.Y; grandN += s.N;
                const colorKey = pct >= 95 ? 'emerald' : pct >= 70 ? 'amber' : 'rose';
                const colorHex = pct >= 95 ? '#10b981' : pct >= 70 ? '#f59e0b' : '#f43f5e';
                chartLabels.push('Topic ' + t.topic + ': ' + t.name.substring(0, 30) + '...');
                chartData.push(pct); chartColors.push(colorHex); chartRaw.push({ y: s.Y, n: s.N });
                let teamRows = '';
                Object.keys(s.Teams).sort().forEach(tm => {
                    const ty = s.Teams[tm].Y; const tn = s.Teams[tm].N;
                    teamRows += `<div class="team-row"><span class="font-bold text-slate-600 truncate">${tm}</span><span class="text-emerald-600 font-black">Y: ${ty}</span><span class="text-rose-500 font-black">N: ${tn}</span></div>`;
                });
                container.innerHTML += `<div class="topic-card rounded-2xl p-6 flex flex-col"><div class="flex justify-between items-start mb-4"><div class="flex items-center gap-3"><span class="bg-${colorKey}-50 text-${colorKey}-600 w-8 h-8 rounded-lg flex items-center justify-center font-black text-xs border border-${colorKey}-100">${t.topic}</span><h4 class="text-sm font-black text-slate-800">${t.name}</h4></div><span class="text-lg font-black text-${colorKey}-600">${pct}%</span></div><div class="flex gap-6 mb-4 px-2"><div><p class="text-[8px] font-black text-slate-400 uppercase">Success</p><p class="text-xl font-black text-emerald-600">${ty.toLocaleString()}</p></div><div><p class="text-[8px] font-black text-slate-400 uppercase">Pending</p><p class="text-xl font-black text-rose-500">${tn.toLocaleString()}</p></div></div><div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden mb-4"><div class="bg-${colorKey}-500 h-full rounded-full" style="width: ${pct}%"></div></div><div class="team-list"><div class="px-3 py-2 bg-slate-200/50 text-[9px] font-black text-slate-500 uppercase flex justify-between"><span>Service Team</span><span>Status</span></div>${teamRows || '<div class="p-4 text-center text-[10px] text-slate-400 italic">No data found</div>'}</div></div>`;
            });
            const tSum = grandY + grandN; const oPct = tSum > 0 ? ((grandY / tSum) * 100).toFixed(1) : 0;
            document.getElementById('summary-y').innerText = grandY.toLocaleString();
            document.getElementById('summary-n').innerText = grandN.toLocaleString();
            document.getElementById('summary-total').innerText = tSum.toLocaleString();
            document.getElementById('summary-pct').innerText = oPct + '%';
            updateChart(chartLabels, chartData, chartColors, chartRaw);
        }

        function updateChart(labels, data, colors, raw) {
            const ctx = document.getElementById('overviewChart').getContext('2d');
            if (overviewChart) overviewChart.destroy();
            overviewChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: '% Success Rate', data: data, backgroundColor: colors, borderRadius: 8, barThickness: 20 }] },
                options: {
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { beginAtZero: true, max: 100, grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Sarabun', size: 10 }, color: '#64748b', callback: v => v + '%' } },
                        y: { grid: { display: false }, ticks: { font: { family: 'Sarabun', size: 10, weight: 'bold' }, color: '#64748b' } }
                    },
                    plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ['Success Rate: ' + c.formattedValue + '%', 'Success (Y): ' + raw[c.dataIndex].y.toLocaleString(), 'Pending (N): ' + raw[c.dataIndex].n.toLocaleString()] } } }
                }
            });
        }
        updateFilter('All');
    </script>
</body></html>
